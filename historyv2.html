<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Replica</title>
    <style>
        /* CSS Variables for Color Palette */
        :root {
            --bg-main: #181818;
            --bg-sidebar: #111111;
            --bg-panel: #1e1e1e;
            --text-main: #e0e0e0;
            --text-gold: #c5a059;
            --text-muted: #888888;
            --accent-green: #6b8e23;
            --accent-purple: #6a5acd;
            --border-color: #333333;
            --font-heading: 'Times New Roman', Times, serif;
            --font-body: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-body);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 200px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .logo-container {
            padding: 30px 20px;
            text-align: center;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding-top: 20px;
        }

        .nav-item {
            color: var(--text-gold);
            text-decoration: none;
            padding: 15px 20px;
            font-weight: 600;
            font-family: var(--font-heading);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background-color: #222;
        }

        /* Active History Button Styling */
        .nav-item.active {
            background-color: #c5a059;
            color: black;
            border: 2px solid var(--accent-purple);
            margin: 10px;
            padding: 8px 10px;
            border-radius: 2px;
            font-weight: bold;
        }

        .user-account {
            padding: 20px;
            color: var(--text-gold);
            font-family: var(--font-heading);
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-top: 1px solid var(--border-color);
        }

        /* --- Main Content Area --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 40px;
            overflow-y: auto;
        }

        .header h1 {
            color: var(--text-gold);
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            height: 100%;
        }

        /* --- Chart Section --- */
        .chart-section {
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .chart-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .tab {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .tab.active {
            background-color: #222;
            color: white;
            border-color: #444;
            font-weight: bold;
        }

        .chart-title {
            text-align: center;
            font-family: var(--font-body);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Mock Chart Layout */
        .chart-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            position: relative;
        }

        .y-axis {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 40px;
            color: var(--text-muted);
        }

        .graph-area {
            margin-left: 30px;
            margin-bottom: 40px;
            flex-grow: 1;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent calc(20% - 1px),
                var(--border-color) calc(20% - 1px),
                var(--border-color) 20%
            );
        }

        .x-axis {
            display: flex;
            justify-content: space-between;
            margin-left: 30px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .x-axis span {
            transform: rotate(-45deg);
            transform-origin: left top;
            margin-top: 10px;
        }

        /* --- Goals Sidebar --- */
        .goals-sidebar {
            background-color: #1a1a1a;
            border-left: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Star Badge Approximation */
        .star-badge {
            width: 120px;
            height: 120px;
            background-color: #222;
            color: var(--accent-green);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            margin-bottom: 30px;
        }

        .goals-sidebar h2 {
            color: var(--text-gold);
            font-family: var(--font-heading);
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-size: 1.8rem;
        }

        .goal-details {
            width: 100%;
        }

        .label {
            font-size: 0.75rem;
            color: var(--text-main);
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .value {
            color: var(--accent-green);
            font-size: 1.5rem;
            font-family: var(--font-heading);
            margin-bottom: 30px;
        }

        .budget-btn {
            background-color: #222;
            border: 1px solid var(--border-color);
            color: var(--accent-green);
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .add-btn {
            background-color: #222;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 100%;
            padding: 5px;
            border-radius: 20px;
            font-size: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <img src="your-logo.png" alt="Superteam">
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item">HOME</a>
            <a href="#" class="nav-item">DASHBOARD</a>
            <a href="#" class="nav-item">SAVINGS</a>
            <a href="#" class="nav-item">INSIGHTS</a>
            <a href="#" class="nav-item active">HISTORY</a>
        </nav>
        <div style="flex-grow: 1;"></div>
        <div class="user-account">
            USER ACCOUNT
        </div>
    </div>

    <main class="main-content">
        <header class="header">
            <h1>HISTORY</h1>
        </header>

        <div class="dashboard-grid">
            <section class="chart-section">
                <div class="chart-tabs">
                    <button class="tab active">TOTAL SAVED</button>
                    <button class="tab">MONTHLY SPENDING</button>
                    <button class="tab">ACTIVITY LOG</button>
                </div>

                <h2 class="chart-title">TOTAL SAVED</h2>

                <div class="chart-container">
                    <div class="y-axis">
                        <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span><span>0</span>
                    </div>
                    <div class="graph-area">
                        <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style="position: absolute; top:0; left:0;">
                            <polyline points="5,80 25,60 45,40 65,20" fill="none" stroke="#c5a059" stroke-width="0.5"/>
                            <circle cx="5" cy="80" r="1" fill="#c5a059" />
                            <circle cx="25" cy="60" r="1" fill="#c5a059" />
                            <circle cx="45" cy="40" r="1" fill="#c5a059" />
                            <circle cx="65" cy="20" r="1" fill="#c5a059" />
                        </svg>
                    </div>
                    <div class="x-axis">
                        <span>January</span>
                        <span>February</span>
                        <span>March</span>
                        <span>April</span>
                        <span>May</span>
                        <span>June</span>
                        <span>July</span>
                        <span>August</span>
                        <span>September</span>
                        <span>October</span>
                        <span>November</span>
                        <span>December</span>
                    </div>
                </div>
            </section>

            <aside class="goals-sidebar">
                <div class="star-badge">
                    ?? %
                </div>
                <h2>GOALS</h2>
                
                <div class="goal-details">
                    <p class="label">SET GOAL PRICE:</p>
                    <p class="value">$??</p>
                    
                    <p class="label">CURRENT BALANCE:</p>
                    <p class="value">$??</p>
                    
                    <p class="label">LINKED BUDGET PLAN:</p>
                    <button class="budget-btn">Budget #1</button>
                    <button class="add-btn">⊕</button>
                </div>
            </aside>
        </div>
    </main>

</body>
</html>
